<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>AvaliaMarket</title>

<style>

body{
font-family:Arial;
background:#fff3cd;
margin:0;
}

header{
background:#d32f2f;
color:white;
padding:20px;
text-align:center;
}

.container{
padding:20px;
}

.card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

button{
background:#fbc02d;
border:none;
padding:10px 20px;
border-radius:5px;
cursor:pointer;
}

input,select{
padding:8px;
margin:5px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
border:1px solid #ccc;
padding:8px;
text-align:center;
}

th{
background:#fbc02d;
}

</style>

</head>

<body>

<header>
<h1>Avaliação do Supermercado</h1>
</header>

<div class="container">

<div class="card">

<h2>Avaliar atendimento</h2>

<select id="nota">
<option value="">Escolha a nota</option>
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
</select>

<button onclick="avaliar()">Enviar</button>

<p id="media">Média: 0</p>
<p id="total">Total: 0</p>

</div>

<div class="card">

<h2>Cadastro de Produtos</h2>

<input id="produto" placeholder="Nome do produto">

<select id="tipo">
<option value="unidade">Unidade</option>
<option value="peso">Peso</option>
</select>

<input id="quantidade" type="number" placeholder="Quantidade">

<button onclick="addProduto()">Cadastrar</button>

<table>

<thead>
<tr>
<th>Produto</th>
<th>Tipo</th>
<th>Quantidade</th>
</tr>
</thead>

<tbody id="tabela"></tbody>

</table>

</div>

</div>

<script>

let notas=[]
let produtos=[]

function avaliar(){

let nota=document.getElementById("nota").value

if(nota==""){
alert("Escolha uma nota")
return
}

notas.push(Number(nota))

let soma=0

notas.forEach(n=>{
soma+=n
})

let media=soma/notas.length

document.getElementById("media").innerText="Média: "+media.toFixed(1)
document.getElementById("total").innerText="Total: "+notas.length

}

function addProduto(){

let nome=document.getElementById("produto").value
let tipo=document.getElementById("tipo").value
let quantidade=document.getElementById("quantidade").value

if(nome=="" || quantidade==""){
alert("Preencha os campos")
return
}

produtos.push({
nome,
tipo,
quantidade
})

render()

document.getElementById("produto").value=""
document.getElementById("quantidade").value=""

}

function render(){

let tabela=document.getElementById("tabela")

tabela.innerHTML=""

produtos.forEach(p=>{

tabela.innerHTML+=`
<tr>
<td>${p.nome}</td>
<td>${p.tipo}</td>
<td>${p.quantidade}</td>
</tr>
`

})

}

</script>

</body>
</html>
