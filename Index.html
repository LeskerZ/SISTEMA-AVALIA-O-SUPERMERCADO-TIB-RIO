<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>AvaliaMarket</title>

<style>

body{
font-family: Arial;
background:#fff8e1;
margin:0;
padding:0;
}

header{
background:#c62828;
color:white;
padding:20px;
text-align:center;
}

.container{
padding:20px;
}

.card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

button{
background:#f9a825;
border:none;
padding:10px 20px;
color:white;
border-radius:5px;
cursor:pointer;
}

input,select{
padding:8px;
margin:5px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
border:1px solid #ccc;
padding:8px;
text-align:center;
}

th{
background:#f9a825;
color:white;
}

</style>

</head>

<body>

<header>
<h1>AvaliaMarket</h1>
<p>Sistema de Avaliação e Controle de Produtos</p>
</header>

<div class="container">

<div class="card">
<h2>Avaliação do Cliente</h2>

<select id="nota">
<option value="">Escolha a nota</option>
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
</select>

<input type="text" id="comentario" placeholder="Comentário">

<button onclick="enviar()">Enviar Avaliação</button>

</div>

<div class="card">

<h2>Cadastro de Produto</h2>

<input type="text" id="produto" placeholder="Produto">

<select id="tipo">

<option value="unidade">Unidade</option>
<option value="peso">Peso (kg)</option>

</select>

<input type="number" id="quantidade" placeholder="Quantidade">

<button onclick="adicionar()">Adicionar</button>

<table>

<thead>
<tr>

<th>Produto</th>
<th>Tipo</th>
<th>Quantidade</th>

</tr>
</thead>

<tbody id="tabela"></tbody>

</table>

</div>

<div class="card">

<h2>Relatório de Avaliações</h2>

<p id="media">Média: 0</p>
<p id="total">Total de avaliações: 0</p>

</div>

</div>

<script>

let avaliacoes = []
let produtos = []

function enviar(){

let nota = document.getElementById("nota").value

if(nota==""){

alert("Escolha uma nota")

return

}

avaliacoes.push(Number(nota))

let soma = 0

avaliacoes.forEach(n=>{

soma += n

})

let media = soma / avaliacoes.length

document.getElementById("media").innerText = "Média: " + media.toFixed(1)

document.getElementById("total").innerText = "Total de avaliações: " + avaliacoes.length

document.getElementById("comentario").value=""

}

function adicionar(){

let produto = document.getElementById("produto").value
let tipo = document.getElementById("tipo").value
let quantidade = document.getElementById("quantidade").value

if(produto=="" || quantidade==""){

alert("Preencha os campos")

return

}

produtos.push({

produto,
tipo,
quantidade

})

render()

document.getElementById("produto").value=""
document.getElementById("quantidade").value=""

}

function render(){

let tabela = document.getElementById("tabela")

tabela.innerHTML=""

produtos.forEach(p=>{

tabela.innerHTML += `
<tr>

<td>${p.produto}</td>
<td>${p.tipo}</td>
<td>${p.quantidade}</td>

</tr>
`

})

}

</script>

</body>
</html>
