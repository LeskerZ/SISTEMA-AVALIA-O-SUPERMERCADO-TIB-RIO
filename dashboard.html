<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>Dashboard de Avaliações</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
padding:20px;
}

h1{
text-align:center;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
border:1px solid #ddd;
padding:10px;
text-align:center;
}

th{
background:#d32f2f;
color:white;
}

</style>

</head>

<body>

<h1>Dashboard de Avaliações</h1>

<table>

<thead>
<tr>
<th>Cliente</th>
<th>Açougue</th>
<th>Hortifruti</th>
<th>Prateleiras</th>
<th>Caixa</th>
<th>Comentário</th>
<th>Data</th>
</tr>
</thead>

<tbody id="tabela">

</tbody>

</table>

<script>

function carregarAvaliacoes(){

let avaliacoes = JSON.parse(localStorage.getItem("avaliacoes")) || []

let tabela = document.getElementById("tabela")

tabela.innerHTML=""

avaliacoes.forEach(a => {

let linha = document.createElement("tr")

linha.innerHTML = `
<td>${a.nome} ${a.sobrenome}</td>
<td>${a.acougue}</td>
<td>${a.hortifruti}</td>
<td>${a.prateleiras}</td>
<td>${a.caixa}</td>
<td>${a.comentario}</td>
<td>${a.data}</td>
`

tabela.appendChild(linha)

})

}

carregarAvaliacoes()

</script>

</body>
</html>
