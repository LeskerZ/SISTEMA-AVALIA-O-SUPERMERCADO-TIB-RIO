<!DOCTYPE html>
<html lang="pt-br">


  Produzido por Kauã Castro 
<head>
<meta charset="UTF-8">
<title>Avaliação do Supermercado Tibério</title>

<style>

body{
font-family:Arial;
background:#fff8e1;
margin:0;
}

header{
background:#d32f2f;
color:white;
padding:20px;
text-align:center;
}

.container{
padding:20px;
max-width:700px;
margin:auto;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
margin-bottom:20px;
}

h2{
color:#d32f2f;
}

.estrelas{
font-size:30px;
cursor:pointer;
color:#ccc;
}

.ativa{
color:#fbc02d;
}

textarea{
width:100%;
padding:10px;
margin-top:10px;
}

button{
background:#fbc02d;
border:none;
padding:12px;
margin-top:15px;
width:100%;
font-size:16px;
cursor:pointer;
border-radius:5px;
font-weight:bold;
}

.resultado{
margin-top:15px;
font-weight:bold;
}

</style>

</head>

<body>

<header>
<h1>Avaliação do Supermercado Tibério</h1>
<p>Sua opinião ajuda a melhorar nosso atendimento</p>
</header>

<div class="container">

<div class="card">

<h2>Açougue</h2>
<div class="estrelas" data-setor="acougue"></div>

<h2>Hortifruti</h2>
<div class="estrelas" data-setor="hortifruti"></div>

<h2>Prateleiras</h2>
<div class="estrelas" data-setor="prateleiras"></div>

<h2>Caixa</h2>
<div class="estrelas" data-setor="caixa"></div>

<h2>Observação</h2>

<textarea id="comentario" rows="4" placeholder="Deixe um comentário (opcional)"></textarea>

<button onclick="enviar()">Enviar Avaliação</button>

<p class="resultado" id="msg"></p>

</div>

</div>

<script>

let avaliacoes = JSON.parse(localStorage.getItem("avaliacoes")) || []

let notas = {
acougue:0,
hortifruti:0,
prateleiras:0,
caixa:0
}

document.querySelectorAll(".estrelas").forEach(container=>{

for(let i=1;i<=5;i++){

let estrela=document.createElement("span")
estrela.innerHTML="★"

estrela.onclick=()=>{

notas[container.dataset.setor]=i

container.querySelectorAll("span").forEach((e,index)=>{

e.classList.toggle("ativa",index<i)

})

}

container.appendChild(estrela)

}

})

function enviar(){

let nome=document.getElementById("nome").value
let sobrenome=document.getElementById("sobrenome").value
let comentario=document.getElementById("comentario").value

if(nome=="" || sobrenome==""){
alert("Preencha nome e sobrenome")
return
}

let avaliacao={
nome:nome,
sobrenome:sobrenome,
notas:{...notas},
comentario:comentario,
data:new Date().toLocaleString()
}

avaliacoes.push(avaliacao)

localStorage.setItem("avaliacoes",JSON.stringify(avaliacoes))

document.getElementById("msg").innerText=
"Avaliação enviada! Total de avaliações: "+avaliacoes.length

document.getElementById("comentario").value=""

}

avaliacoes.push(avaliacao)

localStorage.setItem("avaliacoes",JSON.stringify(avaliacoes))

document.getElementById("msg").innerText=
"Avaliação enviada! Total de avaliações: "+avaliacoes.length

document.getElementById("comentario").value=""

}

</script>

</body>
</html>
