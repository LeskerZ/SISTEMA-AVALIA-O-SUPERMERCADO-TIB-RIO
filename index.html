<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>Sistema de Avaliação - Supermercado Tibério</title>

<style>

body{
font-family:Arial;
background:#fff3cd;
margin:0;
}

header{
background:#d32f2f;
color:white;
padding:20px;
text-align:center;
}

.container{
padding:20px;
}

.card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

button{
background:#fbc02d;
border:none;
padding:10px 20px;
border-radius:5px;
cursor:pointer;
font-weight:bold;
}

input,select{
padding:8px;
margin:5px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
border:1px solid #ccc;
padding:8px;
text-align:center;
}

th{
background:#fbc02d;
}

</style>

</head>

<body>

<header>
<h1>Sistema de Avaliação do Supermercado Tibério</h1>
</header>

<div class="container">

<div class="card">

<h2>Avaliar Atendimento</h2>

<select id="nota">

<option value="">Escolha a nota</option>
<option value="1">1</option>
<option value="2">2</option>
<option value="3">3</option>
<option value="4">4</option>
<option value="5">5</option>

</select>

<button onclick="avaliar()">Enviar Avaliação</button>

<p id="media">Média: 0</p>
<p id="total">Total de avaliações: 0</p>

</div>

<div class="card">

<h2>Cadastro de Produtos</h2>

<input id="produto" placeholder="Nome do produto">

<select id="tipo">
<option value="unidade">Unidade</option>
<option value="peso">Peso (kg)</option>
</select>

<input id="quantidade" type="number" placeholder="Quantidade">

<button onclick="addProduto()">Cadastrar</button>

<table>

<thead>
<tr>
<th>Produto</th>
<th>Tipo</th>
<th>Quantidade</th>
</tr>
</thead>

<tbody id="tabela"></tbody>

</table>

</div>

</div>

<script>

let notas = JSON.parse(localStorage.getItem("notas")) || []
let produtos = JSON.parse(localStorage.getItem("produtos")) || []

function avaliar(){

let nota=document.getElementById("nota").value

if(nota==""){
alert("Escolha uma nota")
return
}

notas.push(Number(nota))

localStorage.setItem("notas", JSON.stringify(notas))

calcularMedia()

}

function calcularMedia(){

let soma=0

notas.forEach(n=>{
soma+=n
})

let media=soma/notas.length

document.getElementById("media").innerText="Média: "+media.toFixed(1)
document.getElementById("total").innerText="Total de avaliações: "+notas.length

}

function addProduto(){

let nome=document.getElementById("produto").value
let tipo=document.getElementById("tipo").value
let quantidade=document.getElementById("quantidade").value

if(nome=="" || quantidade==""){
alert("Preencha todos os campos")
return
}

produtos.push({
nome,
tipo,
quantidade
})

localStorage.setItem("produtos", JSON.stringify(produtos))

render()

document.getElementById("produto").value=""
document.getElementById("quantidade").value=""

}

function render(){

let tabela=document.getElementById("tabela")

tabela.innerHTML=""

produtos.forEach(p=>{

tabela.innerHTML+=`
<tr>
<td>${p.nome}</td>
<td>${p.tipo}</td>
<td>${p.quantidade}</td>
</tr>
`

})

}

render()

if(notas.length>0){
calcularMedia()
}

</script>

</body>
</html>
