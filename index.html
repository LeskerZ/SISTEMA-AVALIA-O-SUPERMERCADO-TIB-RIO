<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>Avaliação do Supermercado Tibério</title>

<style>

body{
font-family:Arial;
background:#fff8e1;
margin:0;
}

header{
background:#d32f2f;
color:white;
padding:20px;
text-align:center;
}

.container{
padding:20px;
max-width:700px;
margin:auto;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
margin-bottom:20px;
}

h2{
color:#d32f2f;
}

input,select{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:10px;
}

textarea{
width:100%;
padding:10px;
margin-top:10px;
}

button{
background:#fbc02d;
border:none;
padding:12px;
margin-top:15px;
width:100%;
font-size:16px;
cursor:pointer;
border-radius:5px;
font-weight:bold;
}

.resultado{
margin-top:15px;
font-weight:bold;
}

</style>

</head>

<body>

<header>
<h1>Avaliação do Supermercado Tibério</h1>
<p>Sua opinião ajuda a melhorar nosso atendimento</p>
</header>

<div class="container">

<div class="card">

<h2>Identificação</h2>

<input id="nome" placeholder="Nome">
<input id="sobrenome" placeholder="Sobrenome">

<h2>Açougue</h2>
<select id="acougue">
<option value="">Escolha uma nota</option>
<option value="1">1</option>
<option value="2">2</option>
<option value="3">3</option>
<option value="4">4</option>
<option value="5">5</option>
</select>

<h2>Hortifruti</h2>
<select id="hortifruti">
<option value="">Escolha uma nota</option>
<option value="1">1</option>
<option value="2">2</option>
<option value="3">3</option>
<option value="4">4</option>
<option value="5">5</option>
</select>

<h2>Prateleiras</h2>
<select id="prateleiras">
<option value="">Escolha uma nota</option>
<option value="1">1</option>
<option value="2">2</option>
<option value="3">3</option>
<option value="4">4</option>
<option value="5">5</option>
</select>

<h2>Caixa</h2>
<select id="caixa">
<option value="">Escolha uma nota</option>
<option value="1">1</option>
<option value="2">2</option>
<option value="3">3</option>
<option value="4">4</option>
<option value="5">5</option>
</select>

<h2>Observação</h2>

<textarea id="comentario" rows="4" placeholder="Deixe um comentário (opcional)"></textarea>

<button onclick="enviar()">Enviar Avaliação</button>

<p class="resultado" id="msg"></p>

</div>

</div>

<script>

let avaliacoes = JSON.parse(localStorage.getItem("avaliacoes")) || []

function enviar(){

let dados = {

nome:document.getElementById("nome").value,
sobrenome:document.getElementById("sobrenome").value,
acougue:document.getElementById("acougue").value,
hortifruti:document.getElementById("hortifruti").value,
prateleiras:document.getElementById("prateleiras").value,
caixa:document.getElementById("caixa").value,
comentario:document.getElementById("comentario").value

}

fetch("https://script.google.com/macros/s/AKfycbz0hDd4fkBOsn7U-FP0rNX4G-TAcGaFZZupVGg1Ah_M67K-Emav3bsDVi7nhd9glZfD/exec",{

method:"POST",
body:JSON.stringify(dados)

})
.then(()=>{

document.getElementById("msg").innerText="Avaliação enviada!"

})

}

let avaliacao={

nome:nome,
sobrenome:sobrenome,

acougue:document.getElementById("acougue").value,
hortifruti:document.getElementById("hortifruti").value,
prateleiras:document.getElementById("prateleiras").value,
caixa:document.getElementById("caixa").value,

comentario:document.getElementById("comentario").value,

data:new Date().toLocaleString()

}

avaliacoes.push(avaliacao)

localStorage.setItem("avaliacoes",JSON.stringify(avaliacoes))

document.getElementById("msg").innerText =
"Avaliação enviada! Total de avaliações: " + avaliacoes.length

document.getElementById("comentario").value=""

}

</script>

</body>

</html>
