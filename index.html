<!DOCTYPE html>
<html lang="pt-br">

<head>
PRODUZIDO POR KAUÃ CASTRO
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Avaliação do Supermercado</title>

<style>

body{
font-family:Arial;
background:#fff8e1;
margin:0;
padding:0;
}

header{
background:#d32f2f;
color:white;
padding:20px;
text-align:center;
}

.container{
max-width:600px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input, select, textarea{

width:100%;
padding:10px;
margin-top:10px;
margin-bottom:15px;
border-radius:5px;
border:1px solid #ccc;

}

button{

background:#d32f2f;
color:white;
border:none;
padding:12px;
border-radius:5px;
width:100%;
font-size:16px;
cursor:pointer;

}

button:hover{
background:#b71c1c;
}

#mensagem{
text-align:center;
margin-top:15px;
font-weight:bold;
}

</style>

</head>

<body>

<header>

<h2>Avalie nosso supermercado</h2>

</header>

<div class="container">

<div class="card">

<input id="nome" placeholder="Nome">

<input id="sobrenome" placeholder="Sobrenome">

<label>Açougue</label>
<select id="acougue">
<option value="5">Excelente</option>
<option value="4">Bom</option>
<option value="3">Regular</option>
<option value="2">Ruim</option>
<option value="1">Péssimo</option>
</select>

<label>Hortifruti</label>
<select id="hortifruti">
<option value="5">Excelente</option>
<option value="4">Bom</option>
<option value="3">Regular</option>
<option value="2">Ruim</option>
<option value="1">Péssimo</option>
</select>

<label>Prateleiras</label>
<select id="prateleiras">
<option value="5">Excelente</option>
<option value="4">Bom</option>
<option value="3">Regular</option>
<option value="2">Ruim</option>
<option value="1">Péssimo</option>
</select>

<label>Caixa</label>
<select id="caixa">
<option value="5">Excelente</option>
<option value="4">Bom</option>
<option value="3">Regular</option>
<option value="2">Ruim</option>
<option value="1">Péssimo</option>
</select>

<textarea id="comentario" placeholder="Comentário"></textarea>

<button onclick="enviar()">Enviar avaliação</button>

<p id="mensagem"></p>

</div>

</div>

<script>

const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbyce0J6VPRRTfPOHQzZFk5DEJ2hPWNOsBUhdEejUVrQ8dYC6sAZMh-SGaVVjxfvF40R/exec";

function enviar(){

var dados = {

nome:document.getElementById("nome").value,
sobrenome:document.getElementById("sobrenome").value,
acougue:document.getElementById("acougue").value,
hortifruti:document.getElementById("hortifruti").value,
prateleiras:document.getElementById("prateleiras").value,
caixa:document.getElementById("caixa").value,
comentario:document.getElementById("comentario").value

};

fetch(URL_SCRIPT,{

method:"POST",

body:JSON.stringify(dados)

})

.then(res=>res.json())

.then(resposta=>{

document.getElementById("mensagem").innerText="Avaliação enviada com sucesso!";

document.querySelectorAll("input, textarea").forEach(e=>e.value="");

})

.catch(()=>{

document.getElementById("mensagem").innerText="Erro ao enviar.";

});

}

</script>

</body>

</html>
